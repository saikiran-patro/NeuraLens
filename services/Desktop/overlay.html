<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; pointer-events: none; }
      body::before { content: ""; position: fixed; inset: 0; box-sizing: border-box; border: 4px solid rgba(48, 137, 255, .96); box-shadow: inset 0 0 22px rgba(48, 137, 255, .5), inset 0 0 52px rgba(48, 137, 255, .16); animation: edge 1.8s ease-in-out infinite; }
      body::after { content: "NeuraLens AI · Screen sharing"; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); padding: 7px 13px; border: 1px solid rgba(255,255,255,.28); border-radius: 999px; color: white; background: rgba(19, 68, 128, .86); font: 600 12px/1 "Segoe UI", sans-serif; box-shadow: 0 7px 24px rgba(18,72,136,.34); }
      @keyframes edge { 50% { border-color: rgba(104, 181, 255, 1); box-shadow: inset 0 0 30px rgba(48,137,255,.68), inset 0 0 68px rgba(48,137,255,.22); } }
      @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }
    </style>
  </head>
  <body></body>
</html>
